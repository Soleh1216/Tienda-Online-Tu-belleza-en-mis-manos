<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Pro | Tu Belleza en mis manos</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --sage: #BDC4AE; --beige: #B49E78; --taupe: #A48D7F; --sand: #D2C6B8;
            --white-soft: #F2F2F2; --blush: #DDBFB6; --bg: #FFFFFF;
            --surface: #FCFCFC; --text: #5A5A5A; --heading: #3A3A3A;
            --muted: #A6A6A6; --line: #F1F1F1; --radius-sm: 10px;
        }

        * { box-sizing: border-box; outline: none; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--white-soft); padding: 20px; color: var(--text); margin: 0; }

        .main-container { max-width: 800px; margin: auto; background: var(--bg); padding: 30px; border-radius: var(--radius-sm); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }

        .header-stats { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .badge-count { background: var(--sage); color: white; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }

        .tabs { display: flex; gap: 10px; margin-bottom: 25px; border-bottom: 2px solid var(--line); }
        .tab-btn { padding: 12px 20px; cursor: pointer; border: none; background: none; font-weight: 600; color: var(--muted); border-bottom: 2px solid transparent; transition: 0.3s; }
        .tab-btn.active { color: var(--beige); border-bottom-color: var(--beige); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        label { display: block; margin-top: 15px; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
        input, textarea, select {
            width: 100%; padding: 12px; margin-top: 6px; border-radius: var(--radius-sm);
            border: 1px solid var(--line); background-color: var(--surface);
            font-family: inherit; font-size: 14px; color: var(--text);
        }
        
        .search-box { position: relative; margin-bottom: 20px; }
        .search-box input { background-color: #fff; border: 2px solid var(--line); padding-left: 40px; }
        .search-box::before { content: '🔍︎​'; position: absolute; left: 15px; top: 22px; font-size: 14px; opacity: 0.5; }

        .botones-form { display: flex; gap: 10px; margin-top: 20px; }
        .btn { padding: 12px; border: none; border-radius: var(--radius-sm); cursor: pointer; font-weight: 600; text-transform: uppercase; font-size: 12px; flex: 1; transition: 0.2s; }
        .btn-primary { background-color: var(--sage); color: white; }
        .btn-cancel { background-color: var(--sand); color: white; display: none; }

        .listado { margin-top: 30px; }
        .item { 
            display: flex; justify-content: space-between; align-items: center; 
            background: #fff; padding: 10px; border-radius: var(--radius-sm); 
            border: 1px solid var(--line); margin-bottom: 8px; transition: 0.2s;
        }
        .item:hover { border-color: var(--beige); }
        
        .cat-tag { background: var(--blush); color: white; font-size: 10px; padding: 2px 8px; border-radius: 4px; margin-bottom: 4px; display: inline-block; }
        .desc-text { font-size: 12px; color: var(--muted); margin: 4px 0; line-height: 1.4; }
        .acciones { display: flex; gap: 12px; }
        .btn-action { color: var(--muted); cursor: pointer; border: none; background: none; font-size: 11px; font-weight: 600; text-transform: uppercase; }
        .btn-edit:hover { color: var(--taupe); }
        .btn-borrar:hover { color: #e57373; }

        .paginacion { display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 20px; }
        .pag-btn { background: white; border: 1px solid var(--line); padding: 5px 12px; cursor: pointer; border-radius: 5px; font-size: 12px; }
/* Miniatura de imagen en la lista */
.mini-foto {
    width: 80px;
    height: 80px;
    background: var(--white-soft);
    border-radius: 8px;
    margin-right: 15px;
    overflow: hidden;
    flex-shrink: 0; /* Evita que se aplaste */
    border: 1px solid var(--line);
}
.mini-foto img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}
    </style>
</head>
<body>

<div class="main-container">
    <div class="header-stats">
        <h2 style="margin:0; font-size: 18px;">Panel de Control</h2>
        <div class="badge-count" id="totalCounter">Total: 0 Productos</div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="openTab('tabProductos')">Productos</button>
        <button class="tab-btn" onclick="openTab('tabCategorias')">Categorías</button>
    </div>

    <div id="tabProductos" class="tab-content active">
        <div id="formSection">
            <h3 id="tituloForm" style="font-size: 16px; color: var(--taupe);">Cargar Nuevo</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div>
                    <label>Categoría</label>
                    <select id="prodCategory"></select>
                </div>
                <div>
                    <label>Nombre del Producto</label>
                    <input id="name" type="text">
                </div>
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
                <div><label>Precio Público</label><input id="pricePublic" type="number"></div>
                <div><label>Precio Alumnas</label><input id="priceStudent" type="number"></div>
                <div><label>Tag (Opcional)</label><input id="prodTag" placeholder="Ej: Sin Stock"></div>
            </div>

            <label>Descripción</label>
            <textarea id="desc" rows="2" placeholder="Breve descripción del producto..."></textarea>

            <div class="botones-form">
                <button class="btn btn-primary" id="btnGuardar">Guardar Producto</button>
                <button class="btn btn-cancel" id="btnCancelarProd" onclick="cancelarEdicion()">Cancelar</button>
            </div>
        </div>

        <hr style="border: 0; border-top: 1px solid var(--line); margin: 30px 0;">

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Buscar por nombre o categoría..." oninput="buscar()">
        </div>

        <div class="listado" id="listaProductos"></div>
        <div id="paginacionProd" class="paginacion"></div>
    </div>

    <div id="tabCategorias" class="tab-content">
        <h3 id="tituloCat" style="font-size: 16px; color: var(--taupe);">Gestionar Categorías</h3>
        <label>Nombre de Categoría</label>
        <input id="newCatName" type="text">
        <div class="botones-form">
            <button class="btn btn-primary" id="btnGuardarCat" onclick="guardarCategoria()">Añadir Categoría</button>
            <button class="btn btn-cancel" id="btnCancelarCat" onclick="cancelarEdicionCat()">Cancelar</button>
        </div>

        <div class="listado" id="listaCategorias" style="margin-top: 40px;"></div>
    </div>
</div>

<script>
    // REEMPLAZA LA LÍNEA DE PRODUCTOS POR ESTO:
    const productosIniciales = [
        { name: "Mousse de limpieza 60g - Idraet", pricePublic: 9800, priceStudent: 9800, desc: "", category: "" },
        { name: "Estuche para pinzas", pricePublic: 7500, priceStudent: 7500, desc: "", category: "" },
        { name: "Espuma Micelar - Promoter Exel", pricePublic: 19900, priceStudent: 19900, desc: "", category: "" },
        { name: "Paleta jade para pegamento de pestaña", pricePublic: 1500, priceStudent: 1500, desc: "", category: "" },
        { name: "Mascarilla Hidratante aminoácidos de ceda Chelica", pricePublic: 4800, priceStudent: 4800, desc: "", category: "" },
        { name: "Mascarilla parche Colágeno labios", pricePublic: 3000, priceStudent: 3000, desc: "", category: "" },
        { name: "Masajeador facial de jade rodillo", pricePublic: 8000, priceStudent: 8000, desc: "", category: "" },
        { name: "Parche Hidrogel para Pestanas", pricePublic: 300, priceStudent: 300, desc: "", tag: "Sin stock", category: "" },
        { name: "Paso 1 y 2 - The Lion Beauty", pricePublic: 3900, priceStudent: 3900, desc: "", tag: "Sin stock", category: "" },
        { name: "Spray - Promoter Exel", pricePublic: 32100, priceStudent: 32100, desc: "", tag: "Sin stock", category: "" },
        { name: "Cinta Adhesiva Hipoalergenica Transpore", pricePublic: 2500, priceStudent: 2500, desc: "", tag: "Sin stock", category: "" },
        { name: "Cinta hipoalergenica color surtido", pricePublic: 900, priceStudent: 900, desc: "", tag: "Sin stock", category: "" },
        { name: "Micro hisopos de madera 50u", pricePublic: 3000, priceStudent: 3000, desc: "", tag: "Sin stock", category: "" },
        { name: "Shampoo pestañas y cejas - Lion Beauty", pricePublic: 9600, priceStudent: 9600, desc: "", tag: "Sin stock", category: "" },
        { name: "Perfilador Cejas X3 Unidades Navaja Quita Vello Facial Depilador", pricePublic: 3800, priceStudent: 3800, desc: "", tag: "Sin stock", category: "" },
        { name: "Bigudie shell", pricePublic: 19200, priceStudent: 19200, desc: "", tag: "Sin stock", category: "" },
        { name: "Limpiador de pestañas pico curvo Gotero 150ml", pricePublic: 3100, priceStudent: 3100, desc: "", tag: "Sin stock", category: "" },
        { name: "Botox - The Lion Beauty", pricePublic: 16000, priceStudent: 16000, desc: "", tag: "Sin stock", category: "" },
        { name: "Adhesivo Para Bigudies Royal Stick - The Lion Beauty", pricePublic: 15500, priceStudent: 15500, desc: "", tag: "Sin stock", category: "" },
        { name: "Pro Easy Gel laminador hidratante - Melania", pricePublic: 19800, priceStudent: 19800, desc: "", tag: "Sin stock", category: "" },
        { name: "Wipes corazón con organizador", pricePublic: 4000, priceStudent: 4000, desc: "", tag: "Sin stock", category: "" },
        { name: "Parches de silicona reutilizables", pricePublic: 10000, priceStudent: 10000, desc: "", tag: "Sin stock", category: "" },
        { name: "Bigudíes Anatómicos moño curva L/D", pricePublic: 15000, priceStudent: 15000, desc: "", tag: "Sin stock", category: "" },
        { name: "Micro hisopos 50u Eloise", pricePublic: 5000, priceStudent: 5000, desc: "", tag: "Sin stock", category: "" },
        { name: "Pegamento para lifting de pestañas Lomansa Original", pricePublic: 16000, priceStudent: 16000, desc: "", tag: "Sin stock", category: "" },
        { name: "Puluk Tox Tox Multi Booster", pricePublic: 45000, priceStudent: 45000, desc: "", tag: "Sin stock", category: "" },
        { name: "Extensión Cherimoya Tecnologicas YY 0.07D Mix (7-13MM)", pricePublic: 9200, priceStudent: 9200, desc: "", tag: "Sin stock", category: "" },
        { name: "Higrómetro Digital", pricePublic: 8000, priceStudent: 8000, desc: "", tag: "Sin stock", category: "" },
        { name: "Hidratante - The Lion Beauty", pricePublic: 16000, priceStudent: 16000, desc: "", tag: "Sin stock", category: "" },
        { name: "Herramienta plástica scorpion para lifting", pricePublic: 2500, priceStudent: 2500, desc: "", tag: "Sin stock", category: "" },
        { name: "Aplicador de make up labial básico 50 u", pricePublic: 3800, priceStudent: 3800, desc: "", tag: "Sin stock", category: "" },
        { name: "Moldes SEA SHELL", pricePublic: 19800, priceStudent: 19800, desc: "", tag: "Sin stock", category: "" },
        { name: "Paso 4 Monodosis 1g - The Lion Beauty", pricePublic: 2200, priceStudent: 2200, desc: "", tag: "Sin stock", category: "" },
        { name: "Adhesivo para Bigudies de silicona Iconsing", pricePublic: 10000, priceStudent: 10000, desc: "", tag: "Sin stock", category: "" },
        { name: "Vincha de spa cool", pricePublic: 6000, priceStudent: 6000, desc: "", tag: "Sin stock", category: "" },
        { name: "Vincha de Moños Skin Care", pricePublic: 4500, priceStudent: 4500, desc: "", tag: "Sin stock", category: "" }
    ];

    let productos = JSON.parse(localStorage.getItem("mis_productos")) || productosIniciales;
    let categorias = JSON.parse(localStorage.getItem("mis_categorias")) || ["Skincare", "Pestañas"];
    
    let editandoIndex = null;
    let editandoCatIndex = null;
    let paginaActual = 1;
    let productosFiltrados = [];
    const prodPorPagina = 6;

    function openTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
        cancelarEdicion();
        cancelarEdicionCat();
        actualizarInterfaz();
    }

    function guardarCategoria() {
        const nombre = document.getElementById("newCatName").value.trim();
        if(!nombre) return;
        if(editandoCatIndex !== null) {
            const viejaCat = categorias[editandoCatIndex];
            productos = productos.map(p => p.category === viejaCat ? {...p, category: nombre} : p);
            categorias[editandoCatIndex] = nombre;
            localStorage.setItem("mis_productos", JSON.stringify(productos));
        } else {
            categorias.push(nombre);
        }
        localStorage.setItem("mis_categorias", JSON.stringify(categorias));
        cancelarEdicionCat();
        actualizarInterfaz();
    }

    function prepararEdicionCat(index) {
        editandoCatIndex = index;
        document.getElementById("newCatName").value = categorias[index];
        document.getElementById("tituloCat").innerText = "Editando Categoría";
        document.getElementById("btnGuardarCat").innerText = "Actualizar Nombre";
        document.getElementById("btnCancelarCat").style.display = "block";
    }

    function cancelarEdicionCat() {
        editandoCatIndex = null;
        document.getElementById("newCatName").value = "";
        document.getElementById("tituloCat").innerText = "Gestionar Categorías";
        document.getElementById("btnGuardarCat").innerText = "Añadir Categoría";
        document.getElementById("btnCancelarCat").style.display = "none";
    }

    function eliminarCategoria(index) {
        if(confirm("¿Eliminar categoría?")) {
            categorias.splice(index, 1);
            localStorage.setItem("mis_categorias", JSON.stringify(categorias));
            actualizarInterfaz();
        }
    }

    function buscar() {
        const term = document.getElementById("searchInput").value.toLowerCase();
        productosFiltrados = productos.filter(p => 
            p.name.toLowerCase().includes(term) || 
            (p.category && p.category.toLowerCase().includes(term))
        );
        paginaActual = 1;
        renderProductos();
    }

    document.getElementById("btnGuardar").addEventListener("click", () => {
        const prod = {
            category: document.getElementById("prodCategory").value,
            name: document.getElementById("name").value.trim(),
            pricePublic: document.getElementById("pricePublic").value,
            priceStudent: document.getElementById("priceStudent").value,
            tag: document.getElementById("prodTag").value.trim(),
            desc: document.getElementById("desc").value.trim()
        };

        if(!prod.name || !prod.pricePublic) return alert("Nombre y Precio requeridos");

        if (editandoIndex !== null) {
            productos[editandoIndex] = prod;
        } else {
            productos.unshift(prod);
        }

        localStorage.setItem("mis_productos", JSON.stringify(productos));
        cancelarEdicion();
        actualizarInterfaz();
    });

    function prepararEdicion(index) {
        const p = productos[index];
        document.getElementById("name").value = p.name;
        document.getElementById("pricePublic").value = p.pricePublic;
        document.getElementById("priceStudent").value = p.priceStudent;
        document.getElementById("prodCategory").value = p.category || "";
        document.getElementById("prodTag").value = p.tag || "";
        document.getElementById("desc").value = p.desc || "";
        
        editandoIndex = index;
        document.getElementById("tituloForm").innerText = "Editando Producto";
        document.getElementById("btnGuardar").innerText = "Actualizar Producto";
        document.getElementById("btnCancelarProd").style.display = "block";
        window.scrollTo(0,0);
    }

    function cancelarEdicion() {
        editandoIndex = null;
        document.getElementById("tituloForm").innerText = "Cargar Nuevo";
        document.getElementById("btnGuardar").innerText = "Guardar Producto";
        document.getElementById("btnCancelarProd").style.display = "none";
        document.querySelectorAll("#tabProductos input, #tabProductos select, #tabProductos textarea").forEach(i => i.value = "");
    }

    function eliminarProducto(index) {
        if(confirm("¿Eliminar definitivamente?")) {
            productos.splice(index, 1);
            localStorage.setItem("mis_productos", JSON.stringify(productos));
            actualizarInterfaz();
        }
    }

    function actualizarInterfaz() {
        const select = document.getElementById("prodCategory");
        select.innerHTML = '<option value="">Sin categoría</option>' + 
            categorias.map(c => `<option value="${c}">${c}</option>`).join('');

        document.getElementById("listaCategorias").innerHTML = categorias.map((c, i) => `
            <div class="item">
                <span style="font-weight:600">${c}</span>
                <div class="acciones">
                    <button class="btn-action btn-edit" onclick="prepararEdicionCat(${i})">Editar</button>
                    <button class="btn-action btn-borrar" onclick="eliminarCategoria(${i})">Borrar</button>
                </div>
            </div>
        `).join('');

        document.getElementById("totalCounter").innerText = `Total: ${productos.length} Productos`;
        buscar();
    }

    function renderProductos() {
        const inicio = (paginaActual - 1) * prodPorPagina;
        const visibles = productosFiltrados.slice(inicio, inicio + prodPorPagina);

        document.getElementById("listaProductos").innerHTML = visibles.map((p) => {
            const originalIndex = productos.findIndex(orig => orig === p);
            
            // LÓGICA DE IMAGEN IGUAL A LA TIENDA
            const fotoNombre = p.name.toLowerCase().trim().replace(/\s+/g, '-');
            
            return `
                <div class="item">
                    <div class="mini-foto">
                        <img src="img/${fotoNombre}.jpg" onerror="this.parentElement.style.display='none';">
                    </div>

                    <div style="flex: 1; padding-right: 10px;">
                        <span class="cat-tag">${p.category || 'Sin Cat.'}</span>
                        <div style="font-weight:600">${p.name} ${p.tag ? `<small style="color:var(--taupe)">(${p.tag})</small>` : ''}</div>
                        <div class="desc-text">${p.desc || ''}</div>
                        <div style="font-size:12px; color:var(--beige)">Público: $${Number(p.pricePublic).toLocaleString()} | Alumnas: $${Number(p.priceStudent).toLocaleString()}</div>
                    </div>
                    <div class="acciones">
                        <button class="btn-action btn-edit" onclick="prepararEdicion(${originalIndex})">Editar</button>
                        <button class="btn-action btn-borrar" onclick="eliminarProducto(${originalIndex})">Borrar</button>
                    </div>
                </div>
            `;
        }).join('');

        renderPaginacion();
    }
    function renderPaginacion() {
        const totalPags = Math.ceil(productosFiltrados.length / prodPorPagina);
        const cont = document.getElementById("paginacionProd");
        if(totalPags <= 1) { cont.innerHTML = ""; return; }
        cont.innerHTML = `
            <button class="pag-btn" ${paginaActual === 1 ? 'disabled' : ''} onclick="cambiarPagina(-1)">Anterior</button>
            <span style="font-size:12px">${paginaActual} de ${totalPags}</span>
            <button class="pag-btn" ${paginaActual >= totalPags ? 'disabled' : ''} onclick="cambiarPagina(1)">Siguiente</button>
        `;
    }

    window.cambiarPagina = (dir) => { paginaActual += dir; renderProductos(); };

    actualizarInterfaz();
</script>
</body>
</html>
