<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Belleza en mis manos | Tienda Online</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --sage: #BDC4AE;      --beige: #B49E78;     --taupe: #A48D7F;
            --sand: #D2C6B8;      --white-soft: #F2F2F2; --blush: #DDBFB6;
            --bg: #FFFFFF;        --text: #4A4A4A;      --heading: #2D2D2D;
            --muted: #A0A0A0;     --line: #EFEFEF;      --radius: 20px;
        }

        * { box-sizing: border-box; outline: none; }
        body { margin: 0; font-family: 'Poppins', sans-serif; color: var(--text); background-color: var(--bg); }
        .container { width: min(1200px, calc(100% - 40px)); margin: 0 auto; }
        .hidden { display: none !important; }

        /* BUSCADOR */
        .search-container { margin-bottom: 25px; width: 100%; }
        .search-input { 
            width: 100%; 
            padding: 12px 25px; 
            border: 1px solid var(--line); 
            border-radius: 50px; 
            font-family: inherit; 
            font-size: 14px; 
            transition: 0.3s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .search-input:focus { border-color: var(--sand); box-shadow: 0 0 10px rgba(210, 198, 184, 0.4); }

        /* BOTONES */
        .btn-categorias {
            background: white;
            border: 1px solid var(--line);
            color: var(--text);
            padding: 8px 22px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-categorias:hover { background: var(--white-soft); border-color: var(--sand); }

        /* HERO */
        .hero { min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; background-color: var(--white-soft); }
        .hero-wrap { width: min(600px, 100%); padding: 40px; background: white; border-radius: var(--radius); }
        .brand-logo { width: 160px; margin-bottom: 30px; }
        
        .btn { font-family: inherit; cursor: pointer; transition: 0.2s; text-transform: uppercase; letter-spacing: 1px; font-size: 13px; font-weight: 600; padding: 16px 25px; border-radius: var(--radius); border: none; width: 100%; }
        .btn-sage { background: var(--sand); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--beige); color: var(--beige); }

        /* CATEGORÍAS */
        .category-screen { padding: 60px 0; text-align: center; }
        .category-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin: 30px 0; }
        .cat-card { background: white; padding: 50px 20px; border-radius: var(--radius); cursor: pointer; border: 1px solid var(--line); transition: 0.3s; }
        .cat-card:hover {
            background-color: var(--sand);
            border-color: #B49E78;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .cat-card:hover h3, .cat-card:hover span { color: white !important; }

        /* PRODUCTOS */
        .catalog-page { padding: 40px 0; }
        .catalog-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid var(--line); padding-bottom: 20px; }
        .catalog-layout { display: grid; grid-template-columns: 1fr 350px; gap: 40px; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 25px; }
        .p-card { background: white; border: 1px solid var(--line); border-radius: 20px; padding: 25px; display: flex; flex-direction: column; transition: 0.3s; }
        .p-card:hover { border-color: var(--sand); }
        .p-img-container { width: 80%; margin: 0 auto 15px; aspect-ratio: 1/1; background: var(--white-soft); border-radius: 0%; overflow: hidden; border: 1px solid var(--line); }
        .p-img-container img { width: 100%; height: 100%; object-fit: cover; }
        .p-price { font-size: 20px; font-weight: 600; color: var(--taupe); margin-bottom: 15px; }

        /* CARRITO */
        .section-carrito { background: var(--white-soft); padding: 30px; border-radius: var(--radius); height: fit-content; position: sticky; top: 20px; }
        .qty-controls { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
        .btn-qty { background: white; border: 1px solid var(--line); border-radius: 50%; width: 24px; height: 24px; cursor: pointer; }
        .c-item { padding: 15px 0; border-bottom: 1px solid rgba(0,0,0,0.05); }

        @media (max-width: 900px) { .catalog-layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <section class="hero" id="homeView">
        <div class="hero-wrap">
            <img class="brand-logo" src="logo.png" alt="Logo">
            <p style="color: var(--muted); margin-bottom: 40px;">¡Bienvenida/o a nuestra tienda online! Elegí tus productos y enviá tu pedido por WhatsApp.</p>
            <div style="display: flex; flex-direction: column; gap: 15px;">
                <button class="btn btn-outline" onclick="initFlow('public')">Catálogo Público</button>
                <button class="btn btn-sage" onclick="showLogin()">Acceso Alumnas</button>
            </div>
            <div id="loginBox" class="hidden" style="margin-top: 20px;">
                <input class="input-text" style="width:100%; padding:12px; margin-bottom:10px; border:1px solid var(--line); border-radius: 10px;" type="password" id="passwordInput" placeholder="Contraseña">
                <button class="btn btn-sage" onclick="checkPassword()">Ingresar ahora</button>
            </div>
        </div>
    </section>

    <section class="container category-screen hidden" id="categoryView">
        <header class="catalog-header">
            <img src="logo.png" style="width: 110px; cursor:pointer" onclick="goHome()">
            <button class="btn-categorias" onclick="goHome()">← Inicio</button>
        </header>
        <h2 style="font-weight: 400; color: var(--taupe);">Selecciona una Categoría</h2>
        <div class="category-grid" id="categoryGrid"></div>
    </section>

    <main class="container catalog-page hidden" id="catalogView">
        <header class="catalog-header">
            <div style="display: flex; align-items: center; gap: 15px;">
                <img src="logo.png" style="width: 110px; cursor:pointer" onclick="goHome()">
                <span id="currentCatName" style="color: var(--muted); font-size: 14px;"></span>
            </div> 
            <button class="btn-categorias" onclick="showCategories()">← Categorías</button>
        </header>

        <div class="search-container">
            <input type="text" id="searchInput" class="search-input" placeholder="🔍︎ Buscar productos en esta sección..." onkeyup="filterProducts()">
        </div>

        <div class="catalog-layout">
            <section id="productsGrid" class="products-grid"></section>

            <aside class="section-carrito">
                <h3 style="text-transform: uppercase; font-size: 16px; color: var(--taupe);">Tu Pedido</h3>
                <div id="cartList"></div>
                <div style="margin-top: 20px; border-top: 1px solid rgba(0,0,0,0.1); padding-top: 15px;">
                    <div style="display: flex; justify-content: space-between; font-weight: 600; font-size: 18px; margin-bottom: 20px;">
                        <span>Total</span><span id="totalPrice">$0</span>
                    </div>
                    <button class="btn btn-sage" onclick="sendWhatsApp()">Enviar por WhatsApp</button>
                    <button onclick="goHome()" style="background:none; border:none; width:100%; margin-top:15px; color:var(--muted); cursor:pointer; font-size:12px; text-decoration:underline;">← Volver al Inicio</button>
                </div>
            </aside>
        </div>
    </main>

    <script>
        const whatsappNumber = "5492614686718";
        const alumnaPassword = "alumnaslili";
        let currentSection = 'public';
        let cart = [];
        let productsInView = []; 

        // NUEVA FUNCIÓN: Busca el archivo JSON en tu repositorio de GitHub
        async function getProducts() {
            try {
                const response = await fetch('productos.json');
                if (!response.ok) throw new Error("No se pudo cargar el archivo productos.json");
                return await response.json();
            } catch (error) {
                console.error("Error:", error);
                return [];
            }
        }

        function initFlow(section) {
            currentSection = section;
            document.getElementById("homeView").classList.add("hidden");
            showCategories();
        }

        async function showCategories() {
            document.getElementById("catalogView").classList.add("hidden");
            document.getElementById("categoryView").classList.remove("hidden");
            
            const productos = await getProducts(); // Lee desde el archivo, no desde LocalStorage
            const conteoCategorias = {};
            productos.forEach(p => {
                const cat = p.category || 'General';
                conteoCategorias[cat] = (conteoCategorias[cat] || 0) + 1;
            });

            const grid = document.getElementById("categoryGrid");
            grid.innerHTML = Object.keys(conteoCategorias).map(cat => `
                <div class="cat-card" onclick="openCategory('${cat}')">
                    <h3 style="margin-bottom: 10px;">${cat}</h3>
                    <span style="font-size: 12px; color: var(--muted); font-weight: 400;">
                        ${conteoCategorias[cat]} ${conteoCategorias[cat] === 1 ? 'producto' : 'productos'}
                    </span>
                </div>
            `).join('');
        }

        function openCategory(category) {
            document.getElementById("categoryView").classList.add("hidden");
            document.getElementById("catalogView").classList.remove("hidden");
            document.getElementById("currentCatName").innerText = " / " + category;
            document.getElementById("searchInput").value = ""; 
            renderProducts(category);
        }

        async function renderProducts(filter) {
            const productos = await getProducts();
            productsInView = productos.filter(p => (p.category || 'General') === filter);
            displayProducts(productsInView);
        }

        function displayProducts(list) {
            const grid = document.getElementById("productsGrid");
            if(list.length === 0) {
                grid.innerHTML = `<p style="grid-column:1/-1; text-align:center; color:var(--muted); padding:40px;">No se encontraron productos.</p>`;
                return;
            }
            grid.innerHTML = list.map(p => {
                const precio = currentSection === 'public' ? p.pricePublic : p.priceStudent;
                const fotoNombre = p.name.toLowerCase().trim().replace(/\s+/g, '-');
                return `
                    <div class="p-card">
                        <div class="p-img-container"><img src="img/${fotoNombre}.jpg" onerror="this.style.display='none';"></div>
                        <h3 style="font-size:16px; margin:0 0 10px;">${p.name}</h3>
                        <div class="p-price">$${Number(precio).toLocaleString('es-AR')}</div>
                        <button class="btn" style="background:var(--sand); color:white; font-size:11px; padding:10px;" onclick="addToCart('${p.name}', ${precio})">Añadir</button>
                    </div>`;
            }).join('');
        }

        function filterProducts() {
            const term = document.getElementById("searchInput").value.toLowerCase();
            const filtered = productsInView.filter(p => p.name.toLowerCase().includes(term));
            displayProducts(filtered);
        }

        function addToCart(name, price) {
            const item = cart.find(i => i.name === name);
            if(item) item.qty++; else cart.push({name, price, qty: 1});
            renderCart();
        }

        function updateQty(name, change) {
            const item = cart.find(i => i.name === name);
            if (item) {
                item.qty += change;
                if (item.qty <= 0) cart = cart.filter(i => i.name !== name);
            }
            renderCart();
        }

        function renderCart() {
            const list = document.getElementById("cartList");
            const totalEl = document.getElementById("totalPrice");
            if(cart.length === 0) {
                list.innerHTML = `<p style="color:var(--muted); font-size:14px;">El carrito está vacío.</p>`;
                totalEl.innerText = "$0";
                return;
            }
            let total = 0;
            list.innerHTML = cart.map(item => {
                total += item.price * item.qty;
                return `
                    <div class="c-item">
                        <strong>${item.name}</strong>
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:5px;">
                            <div class="qty-controls">
                                <button class="btn-qty" onclick="updateQty('${item.name}', -1)">-</button>
                                <span style="font-size:13px; font-weight:600;">${item.qty}</span>
                                <button class="btn-qty" onclick="updateQty('${item.name}', 1)">+</button>
                            </div>
                            <span style="font-size:14px; color:var(--taupe); font-weight:600;">$${(item.price * item.qty).toLocaleString('es-AR')}</span>
                        </div>
                    </div>`;
            }).join('');
            totalEl.innerText = "$" + total.toLocaleString('es-AR');
        }

        function showLogin() { document.getElementById("loginBox").classList.toggle("hidden"); }
        function checkPassword() {
            if(document.getElementById("passwordInput").value === alumnaPassword) initFlow('students');
            else alert("Contraseña incorrecta");
        }
        function goHome() { location.reload(); }

        function sendWhatsApp() {
            if(cart.length === 0) return;
            let msg = `*Pedido de Tú Belleza*%0A_Catálogo: ${currentSection === 'public' ? 'Público' : 'Alumnas'}_%0A%0A`;
            cart.forEach(i => msg += `- ${i.name} x${i.qty}%0A`);
            msg += `%0A*Total: ${document.getElementById("totalPrice").innerText}*`;
            window.open(`https://wa.me/${whatsappNumber}?text=${msg}`);
        }
    </script>
</body>
</html>
